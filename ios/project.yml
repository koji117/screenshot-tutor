# XcodeGen config for the Screenshot Tutor iOS app.
# Run `xcodegen generate` from this directory to (re)create
# ScreenshotTutor.xcodeproj. See ./README.md for setup notes.

name: ScreenshotTutor
options:
  bundleIdPrefix: com.koji11738
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "6GFAY3493L"
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# mlx-swift-lm now ships the LLM/VLM libraries that used to live in
# mlx-swift-examples. The MLXHuggingFace macros expand to code that
# references types from `swift-huggingface` (HuggingFace.HubClient) and
# `swift-transformers` (Tokenizers.Tokenizer), so we link those two
# packages directly even though mlx-swift-lm doesn't pull them in
# transitively.
packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    from: "3.31.3"
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface.git
    from: "0.8.1"
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers.git
    from: "1.3.0"
  # LaTeX math rendering — model summaries of textbook screenshots
  # often emit `$\text{E}(X+Y) = ...$` style notation that needs to be
  # typeset properly to be readable.
  SwiftMath:
    url: https://github.com/mgriebling/SwiftMath.git
    from: "1.7.0"

targets:
  ScreenshotTutor:
    type: application
    platform: iOS
    sources:
      - path: ScreenshotTutor
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: ScreenshotTutor/Resources
    info:
      path: ScreenshotTutor/Resources/Info.plist
      properties:
        CFBundleDisplayName: Screenshot Tutor
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryUsageDescription: >-
          Pick a screenshot to summarize. The image stays on this device.
        NSCameraUsageDescription: >-
          Capture a photo of a textbook page or diagram to summarize.
    dependencies:
      - package: MLXSwiftLM
        product: MLXVLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: SwiftHuggingFace
        product: HuggingFace
      - package: SwiftTransformers
        product: Transformers
      - package: SwiftMath
        product: SwiftMath
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        PRODUCT_BUNDLE_IDENTIFIER: com.koji11738.screenshottutor
        SWIFT_OBJC_BRIDGING_HEADER: ""
        # Lifts the per-app memory cap so Gemma 4 E4B (~3GB) fits
        # without iOS jetsam killing the process partway through
        # load. Requires a paid Apple Developer Program team — the
        # entitlements file is rejected by Personal Teams.
        CODE_SIGN_ENTITLEMENTS: ScreenshotTutor/ScreenshotTutor.entitlements
