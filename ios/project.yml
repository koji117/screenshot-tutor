# XcodeGen config for the Screenshot Tutor iOS app.
# Run `xcodegen generate` from this directory to (re)create
# ScreenshotTutor.xcodeproj. See ./README.md for setup notes.

name: ScreenshotTutor
options:
  bundleIdPrefix: com.koji11738
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# mlx-swift-lm now ships the LLM/VLM libraries that used to live in
# mlx-swift-examples. Track the 3.x release line; mlx-swift-examples
# itself only ships MNIST + StableDiffusion as products today.
packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    from: "3.31.3"

targets:
  ScreenshotTutor:
    type: application
    platform: iOS
    sources:
      - path: ScreenshotTutor
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: ScreenshotTutor/Resources
    info:
      path: ScreenshotTutor/Resources/Info.plist
      properties:
        CFBundleDisplayName: Screenshot Tutor
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryUsageDescription: >-
          Pick a screenshot to summarize. The image stays on this device.
        NSCameraUsageDescription: >-
          Capture a photo of a textbook page or diagram to summarize.
    dependencies:
      - package: MLXSwiftLM
        product: MLXVLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        PRODUCT_BUNDLE_IDENTIFIER: com.koji11738.screenshottutor
        SWIFT_OBJC_BRIDGING_HEADER: ""
